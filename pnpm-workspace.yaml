packages:
  - packages/*
  - apps/*

# —— 行为设置（pnpm 11 起，非 auth/registry 设置须放这里，不再放 .npmrc）——
# shell 脚本跨平台模拟（Windows 上也能跑 package.json scripts 里的 shell 语法）
shellEmulator: true
# 与迁移前 .npmrc 行为一致（两者均为 pnpm 默认值，显式写出以表意图）
shamefullyHoist: false
strictPeerDependencies: false

# —— 供应链安全 ——
# 不允许把已锁定的依赖降级（既有设置，pnpm 11 仍支持）
trustPolicy: no-downgrade
# 发布冷静期：新发布的版本需满 N 分钟才会被安装（pnpm 11 默认 1440=24h）。
# 暂设为 0（关闭）：本仓最近升级的 oxfmt 0.54.0 等平台二进制发布不足 24h，
# 开启 1440 会让 pnpm 11 无法重建 lockfile。待这批包过 24h 后，
# 另开 PR 调回 1440 以获得供应链冷静期保护。
minimumReleaseAge: 0

# —— build 脚本白名单 ——
# pnpm 11 默认 strictDepBuilds=true：带 install/postinstall 脚本但未列入此处的依赖
# 会让 install 直接报错。这里显式允许本仓真正需要构建的依赖。
allowBuilds:
  esbuild: true
  sharp: true

# —— catalog：集中管理多包共用依赖的版本，避免漂移 ——
# 各 package.json 用 "catalog:" 引用，版本统一在此维护。
catalogMode: prefer
catalog:
  typescript: ^6.0.3
  tsdown: ^0.22.2
  vitest: ^4.1.8
  react: ^19.2.7
  react-dom: ^19.2.7
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
